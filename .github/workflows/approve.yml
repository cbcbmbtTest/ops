# ============================================================
# APPROVAL WORKFLOW
# Watches for "Approved" label on issues in ops repo
# When label added → triggers deploy for that app
# Closes issue after successful deployment
#
# GITEA MIGRATION:
# - Replace ubuntu-latest with self-hosted runner name
# - Replace api.github.com with gitea.company.internal/api/v1
# - Replace cbcbmbtTest with Gitea org name
# ============================================================

name: Approve Deployment

on:
  issues:
    types: [labeled]

jobs:
  approve:
    # Only runs when label is "Approved"
    if: github.event.label.name == 'Approved'

    runs-on: ubuntu-latest

    steps:
      # ── Extract app name from issue title ─────────────────
      # Issue title format: "Deploy FacadeConfigurator v1.0.4"
      # Extracts repo name from title
      - name: Extract repo name
        id: extract
        run: |
          TITLE="${{ github.event.issue.title }}"
          REPO=$(echo "$TITLE" | sed 's/Deploy //' | awk '{print $1}')
          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "Deploying: $REPO"

      # ── Trigger central deploy workflow ───────────────────
      # GITEA: replace api.github.com with gitea.company.internal/api/v1
      # GITEA: replace cbcbmbtTest with Gitea org name
      - name: Trigger deploy
        env:
          TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          REPO: ${{ steps.extract.outputs.repo }}
        run: |
          curl -X POST \
            -H "Authorization: token $TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/cbcbmbtTest/ops/actions/workflows/deploy.yml/dispatches \
            -d "{\"ref\":\"main\",\"inputs\":{\"repo\":\"$REPO\"}}"

      # ── Close issue after deployment triggered ────────────
      # GITEA: replace api.github.com with gitea.company.internal/api/v1
      - name: Close issue
        env:
          TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          curl -X PATCH \
            -H "Authorization: token $TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/cbcbmbtTest/ops/issues/$ISSUE \
            -d '{"state":"closed","state_reason":"completed"}'
