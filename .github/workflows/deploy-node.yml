# ============================================================
# DEPLOY NODE.JS
# Handles Node.js app deployment via Docker
# Called by deploy.yml when tech = node
#
# WHEN SERVER READY - uncomment server deployment steps
# and add secrets:
# SERVER_HOST    = server IP or hostname
# SERVER_SSH_KEY = SSH private key
#
# GITEA MIGRATION:
# - Replace ubuntu-latest with self-hosted runner name
# - Replace cbcbmbtTest with Gitea org name
# - Replace github.com with gitea.company.internal
# - Replace Docker Hub with Gitea Docker registry
# ============================================================

name: Deploy Node.js

on:
  workflow_call:
    inputs:
      repo:
        required: true
        type: string
      slug:
        required: true
        type: string
      version:
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          repository: cbcbmbtTest/${{ inputs.repo }}
          token: ${{ secrets.REGISTRY_TOKEN }}
          ref: ${{ inputs.version }}

      # ── Build Docker image ────────────────────────────────
      # NOT YET IMPLEMENTED - no server available
      # When server ready uncomment:
      #
      # - name: Build Docker image
      #   run: docker build -t ${{ inputs.slug }}:${{ inputs.version }} .
      #
      # - name: Push to Gitea registry
      #   run: |
      #     docker tag ${{ inputs.slug }}:${{ inputs.version }} \
      #       gitea.company.internal/cbcbmbtTest/${{ inputs.slug }}:${{ inputs.version }}
      #     docker push gitea.company.internal/cbcbmbtTest/${{ inputs.slug }}:${{ inputs.version }}
      #
      # - name: Deploy to server
      #   run: |
      #     ssh deploy@${{ secrets.SERVER_HOST }} "
      #       docker pull gitea.company.internal/cbcbmbtTest/${{ inputs.slug }}:${{ inputs.version }} &&
      #       docker stop ${{ inputs.slug }} || true &&
      #       docker rm ${{ inputs.slug }} || true &&
      #       docker run -d \
      #         --name ${{ inputs.slug }} \
      #         --restart always \
      #         -p 3000:3000 \
      #         gitea.company.internal/cbcbmbtTest/${{ inputs.slug }}:${{ inputs.version }}
      #     "
      #
      # - name: Configure IIS reverse proxy
      #   run: |
      #     ssh deploy@${{ secrets.SERVER_HOST }} \
      #     "powershell New-WebApplication \
      #       -Name '${{ inputs.slug }}' \
      #       -Site 'Default Web Site' \
      #       -PhysicalPath 'C:\inetpub\apps\${{ inputs.slug }}'"

      - name: No deployment yet
        run: echo "Node.js deployment - server not yet available"

      # ── Register in plugins repo ──────────────────────────
      - name: Register in plugins repo
        env:
          TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: |
          SLUG="${{ inputs.slug }}"
          DESC=$(jq -r '.description' plugin.json)
          VERSION="${{ inputs.version }}"

          cat > $SLUG.json << EOF
          {
            "name": "${{ inputs.repo }}",
            "slug": "$SLUG",
            "description": "$DESC",
            "path": "/$SLUG/",
            "url": "",
            "tech": "node",
            "version": "$VERSION",
            "port": 3000
          }
          EOF

          git clone https://x-token:$TOKEN@github.com/cbcbmbtTest/plugins
          cp $SLUG.json plugins/$SLUG.json
          cd plugins
          git config user.email "ci@company.de"
          git config user.name "CI/CD Bot"
          git add .
          git commit -m "chore: register $SLUG $VERSION"
          git push https://x-token:$TOKEN@github.com/cbcbmbtTest/plugins main
