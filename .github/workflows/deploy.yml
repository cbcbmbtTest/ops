# ============================================================
# CENTRAL DEPLOY WORKFLOW
# Triggers when a deployment PR is merged to main
# Reads deployment manifest from deployments/ folder
# Detects tech and calls correct sub-workflow
#
# SUB-WORKFLOWS:
# - deploy-html.yml   ✅
# - deploy-node.yml   ✅
# - deploy-python.yml ✅
#
# GITEA MIGRATION:
# - Replace ubuntu-latest with self-hosted runner name
# - Replace api.github.com with gitea.company.internal/api/v1
# - Replace cbcbmbtTest with Gitea org name
# ============================================================

name: Central Deploy

on:
  push:
    branches: [main]
    paths:
      - 'deployments/*.yml'

jobs:
  # ── Read deployment manifest ─────────────────────────────
  detect:
    runs-on: ubuntu-latest
    outputs:
      repo: ${{ steps.manifest.outputs.repo }}
      slug: ${{ steps.manifest.outputs.slug }}
      version: ${{ steps.manifest.outputs.version }}
      tech: ${{ steps.tech.outputs.tech }}

    steps:
      - name: Checkout ops repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # ── Find changed deployment manifest ─────────────────
      - name: Get changed manifest
        id: manifest
        run: |
          FILE=$(git diff --name-only HEAD~1 HEAD -- 'deployments/*.yml' | head -1)
          echo "Reading manifest: $FILE"
          REPO=$(yq '.app' $FILE)
          SLUG=$(yq '.slug' $FILE)
          VERSION=$(yq '.version' $FILE)
          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "slug=$SLUG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # ── Checkout app repo ─────────────────────────────────
      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          repository: cbcbmbtTest/${{ steps.manifest.outputs.repo }}
          token: ${{ secrets.REGISTRY_TOKEN }}
          ref: ${{ steps.manifest.outputs.version }}
          path: app

      # ── Detect tech ───────────────────────────────────────
      # Check plugin.json for override first
      # If not set → auto-detect from GitHub languages API
      # GITEA: replace api.github.com with gitea.company.internal/api/v1
      - name: Detect tech
        id: tech
        env:
          TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          REPO: ${{ steps.manifest.outputs.repo }}
        run: |
          OVERRIDE=$(jq -r '.tech // empty' app/plugin.json 2>/dev/null)
          if [ -n "$OVERRIDE" ]; then
            echo "tech=$OVERRIDE" >> $GITHUB_OUTPUT
            echo "Tech override: $OVERRIDE"
          else
            LANGS=$(curl -s \
              -H "Authorization: token $TOKEN" \
              https://api.github.com/repos/cbcbmbtTest/$REPO/languages)
            if echo $LANGS | grep -q "Python"; then
              echo "tech=python" >> $GITHUB_OUTPUT
            elif echo $LANGS | grep -q "C#"; then
              echo "tech=dotnet" >> $GITHUB_OUTPUT
            elif echo $LANGS | grep -q "TypeScript"; then
              echo "tech=node" >> $GITHUB_OUTPUT
            elif echo $LANGS | grep -q "JavaScript"; then
              echo "tech=react" >> $GITHUB_OUTPUT
            else
              echo "tech=html" >> $GITHUB_OUTPUT
            fi
            echo "Tech auto-detected"
          fi

  # ── Call correct sub-workflow ────────────────────────────

  deploy-html:
    needs: detect
    if: needs.detect.outputs.tech == 'html'
    uses: cbcbmbtTest/ops/.github/workflows/deploy-html.yml@main
    with:
      repo: ${{ needs.detect.outputs.repo }}
      slug: ${{ needs.detect.outputs.slug }}
      version: ${{ needs.detect.outputs.version }}
    secrets: inherit

  deploy-node:
    needs: detect
    if: needs.detect.outputs.tech == 'node'
    uses: cbcbmbtTest/ops/.github/workflows/deploy-node.yml@main
    with:
      repo: ${{ needs.detect.outputs.repo }}
      slug: ${{ needs.detect.outputs.slug }}
      version: ${{ needs.detect.outputs.version }}
    secrets: inherit

  deploy-python:
    needs: detect
    if: needs.detect.outputs.tech == 'python'
    uses: cbcbmbtTest/ops/.github/workflows/deploy-python.yml@main
    with:
      repo: ${{ needs.detect.outputs.repo }}
      slug: ${{ needs.detect.outputs.slug }}
      version: ${{ needs.detect.outputs.version }}
    secrets: inherit
