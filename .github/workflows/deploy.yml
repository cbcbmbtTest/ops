# ============================================================
# CENTRAL DEPLOY WORKFLOW
# Detects tech and calls correct sub-workflow
# Posts tech comment on issue after deployment
#
# SUB-WORKFLOWS (must exist as .yml files):
# - deploy-html.yml   ✅
# - deploy-node.yml   ✅
# - deploy-python.yml ✅
#
# ADD LATER when files are created:
# - deploy-react.yml
# - deploy-dotnet.yml
#
# GITEA MIGRATION:
# - Replace ubuntu-latest with self-hosted runner name
# - Replace api.github.com with gitea.company.internal/api/v1
# - Replace cbcbmbtTest with Gitea org name
# ============================================================

name: Central Deploy

on:
  workflow_dispatch:
    inputs:
      repo:
        description: 'App repo name to deploy'
        required: true
      version:
        description: 'Version tag (leave empty for latest)'
        required: false
        default: 'main'
      issue_number:
        description: 'Ops issue number'
        required: false
        default: ''

jobs:
  # ── Detect tech ─────────────────────────────────────────
  detect:
    runs-on: ubuntu-latest
    outputs:
      tech: ${{ steps.tech.outputs.tech }}
      slug: ${{ steps.slug.outputs.slug }}

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          repository: cbcbmbtTest/${{ inputs.repo }}
          token: ${{ secrets.REGISTRY_TOKEN }}
          ref: ${{ inputs.version }}

      # Check plugin.json for manual tech override first
      # If not set → auto-detect from GitHub languages API
      # GITEA: replace api.github.com with gitea.company.internal/api/v1
      - name: Detect tech
        id: tech
        env:
          TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          REPO: ${{ inputs.repo }}
        run: |
          OVERRIDE=$(jq -r '.tech // empty' plugin.json 2>/dev/null)
          if [ -n "$OVERRIDE" ]; then
            echo "tech=$OVERRIDE" >> $GITHUB_OUTPUT
            echo "Tech override from plugin.json: $OVERRIDE"
          else
            LANGS=$(curl -s \
              -H "Authorization: token $TOKEN" \
              https://api.github.com/repos/cbcbmbtTest/$REPO/languages)
            if echo $LANGS | grep -q "Python"; then
              echo "tech=python" >> $GITHUB_OUTPUT
            elif echo $LANGS | grep -q "C#"; then
              echo "tech=dotnet" >> $GITHUB_OUTPUT
            elif echo $LANGS | grep -q "TypeScript"; then
              echo "tech=node" >> $GITHUB_OUTPUT
            elif echo $LANGS | grep -q "JavaScript"; then
              echo "tech=react" >> $GITHUB_OUTPUT
            else
              echo "tech=html" >> $GITHUB_OUTPUT
            fi
            echo "Tech auto-detected"
          fi

      - name: Generate slug
        id: slug
        run: |
          SLUG=$(echo "${{ inputs.repo }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g')
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

  # ── Call correct sub-workflow ────────────────────────────

  deploy-html:
    needs: detect
    if: needs.detect.outputs.tech == 'html'
    uses: cbcbmbtTest/ops/.github/workflows/deploy-html.yml@main
    with:
      repo: ${{ inputs.repo }}
      slug: ${{ needs.detect.outputs.slug }}
      version: ${{ inputs.version }}
    secrets: inherit

  deploy-node:
    needs: detect
    if: needs.detect.outputs.tech == 'node'
    uses: cbcbmbtTest/ops/.github/workflows/deploy-node.yml@main
    with:
      repo: ${{ inputs.repo }}
      slug: ${{ needs.detect.outputs.slug }}
      version: ${{ inputs.version }}
    secrets: inherit

  deploy-python:
    needs: detect
    if: needs.detect.outputs.tech == 'python'
    uses: cbcbmbtTest/ops/.github/workflows/deploy-python.yml@main
    with:
      repo: ${{ inputs.repo }}
      slug: ${{ needs.detect.outputs.slug }}
      version: ${{ inputs.version }}
    secrets: inherit

  # ── Notify ───────────────────────────────────────────────
  # Runs after all deploy jobs complete
  # Only comments tech on issue — labels handled by UploadToServer.yml
  # GITEA: replace api.github.com with gitea.company.internal/api/v1
  # GITEA: replace cbcbmbtTest with Gitea org name
  notify:
    needs: [detect, deploy-html, deploy-node, deploy-python]
    if: |
      always() &&
      inputs.issue_number != '' &&
      (
        needs.deploy-html.result == 'success' ||
        needs.deploy-node.result == 'success' ||
        needs.deploy-python.result == 'success'
      )
    runs-on: ubuntu-latest

    steps:
      # ── Comment tech on issue ─────────────────────────────
      - name: Comment tech on issue
        env:
          TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          ISSUE: ${{ inputs.issue_number }}
          TECH: ${{ needs.detect.outputs.tech }}
        run: |
          curl -X POST \
            -H "Authorization: token $TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/cbcbmbtTest/ops/issues/$ISSUE/comments \
            -d "{\"body\":\"Tech: $TECH\"}"
